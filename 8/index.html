<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С Праздником Весны</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #fef9fa;
            --text-gold: #c5a880;
            --text-dark: #4a3b40;
            --accent-pink: #e69ab0;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, #faeef1 100%);
            font-family: 'Montserrat', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; 
            touch-action: none; /* Запрещает браузерный зум и скролл, отдавая контроль нашему скрипту */
        }

        /* --- ВОЛШЕБНАЯ КНИГА --- */
        #book-container {
            position: absolute; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #ffffff 0%, #fae6ea 100%);
            perspective: 2000px;
        }
        .book {
            width: 90vw; max-width: 450px; height: 65vh; max-height: 650px;
            position: relative; transform-style: preserve-3d; cursor: pointer;
            box-shadow: 0 30px 60px rgba(200, 160, 170, 0.4); border-radius: 5px 20px 20px 5px;
        }
        .page {
            position: absolute; inset: 0; transform-origin: left center;
            transition: transform 1.5s cubic-bezier(0.64, 0.04, 0.35, 1); transform-style: preserve-3d;
        }
        .front, .back {
            position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
            border-radius: 5px 20px 20px 5px; border: 1px solid #f4e6e8;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12%; text-align: center;
            box-shadow: inset -10px 0 20px rgba(0,0,0,0.02); background: #fffdfc;
        }
        .back {
            transform: rotateY(180deg); border-radius: 20px 5px 5px 20px;
            border-left: none; border-right: 15px solid #ebd3d8; background: #ffffff; 
        }
        
        .page-cover .front { background: linear-gradient(135deg, #ffffff 0%, #f4eaec 100%); border-left: 15px solid #ebd3d8; }
        .page-cover { z-index: 4; } .page-2 { z-index: 3; } .page-3 { z-index: 2; }
        
        .book-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(34px, 7vw, 52px); color: var(--text-gold); font-style: italic; margin-bottom: 20px; text-shadow: 0 2px 10px rgba(197, 168, 128, 0.3); }
        .book-text { font-family: 'Cormorant Garamond', serif; font-size: clamp(20px, 4vw, 26px); color: var(--text-dark); line-height: 1.6; }
        .tap-hint { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: var(--accent-pink); margin-top: 40px; animation: pulse 2s infinite; font-weight: 600;}
        
        .page.turned { transform: rotateY(-180deg); }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        #flash { position: absolute; inset: 0; background: #fff; z-index: 90; opacity: 0; pointer-events: none; }

        /* --- 3D СЦЕНА --- */
        #webgl-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0; mix-blend-mode: multiply; }
        #scene-darkener { position: absolute; inset: 0; background: rgba(255, 255, 255, 0.85); z-index: 5; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        #scene-darkener.active { opacity: 1; }
        #hint-3d { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); z-index: 6; color: var(--text-dark); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; pointer-events: none; opacity: 0; font-weight: 600; text-shadow: 0 0 10px #fff; width: 100%; text-align: center;}

        /* --- UI ТЕКСТА --- */
        #ui-layer { position: absolute; inset: 0; z-index: 10; display: flex; align-items: flex-end; justify-content: center; pointer-events: none; opacity: 0; transition: opacity 1s ease; padding-bottom: 6vh; }
        #message-box { 
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 1); padding: 35px 45px; border-radius: 24px; text-align: center; max-width: 85%; width: 550px;
            box-shadow: 0 20px 50px rgba(200, 150, 160, 0.15), inset 0 0 20px rgba(255,255,255,0.9); 
            transform: translateY(30px); opacity: 0; transition: transform 1s cubic-bezier(0.2, 1, 0.2, 1), opacity 1s ease; 
        }
        #ui-layer.active { opacity: 1; pointer-events: auto; }
        #ui-layer.active #message-box { transform: translateY(0); opacity: 1; transition-delay: 0.3s; }
        
        #message-text { color: var(--text-dark); font-family: 'Cormorant Garamond', serif; font-size: clamp(22px, 3.5vw, 36px); font-weight: 400; font-style: italic; margin: 0; line-height: 1.4; }
        
        .back-btn { 
            margin-top: 25px; display: inline-block; padding: 12px 35px; border-radius: 30px; background: transparent; color: var(--text-dark); 
            font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; 
            transition: all 0.4s ease; border: 1px solid var(--accent-pink); 
        }
        .back-btn:hover { background: var(--accent-pink); color: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(230, 154, 176, 0.3); }
    </style>
</head>
<body>

    <!-- ВСТУПЛЕНИЕ -->
    <div id="book-container">
        <div class="book" id="book">
            <div class="page page-3">
                <div class="front"><div class="book-text">Коснись лепестков, чтобы оживить эти мгновения...</div></div>
                <div class="back"></div>
            </div>
            <div class="page page-2" onclick="turnPage(this, true)">
                <div class="front">
                    <div class="book-text">В тайном саду, где весна никогда не увядает, распускается волшебный цветок.<br><br>Его лепестки хранят самые светлые и искренние чувства.</div>
                    <div class="tap-hint">Далее</div>
                </div>
                <div class="back"></div>
            </div>
            <div class="page page-cover" onclick="turnPage(this, false)">
                <div class="front">
                    <div class="book-title">Весенняя<br>Сказка</div>
                    <div class="book-text" style="font-size: 16px;">Для самой прекрасной</div>
                    <div class="tap-hint">Открыть</div>
                </div>
                <div class="back"></div>
            </div>
        </div>
    </div>
    <div id="flash"></div>

    <!-- 3D СЦЕНА -->
    <div id="webgl-container"></div>
    <div id="scene-darkener"></div>
    <div id="hint-3d">Крути, приближай и выбирай,<br>чтобы выбрать воспоминание</div>

    <div id="ui-layer">
        <div id="message-box">
            <p id="message-text">Текст</p>
            <button class="back-btn" onclick="zoomOut()">Вернуться</button>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. ПЛАВНЫЙ ПЕРЕХОД БЕЗ ЛАГОВ (GSAP Timeline) ---
        let isSceneActive = false; 
        
        function turnPage(pageElement, isLast) {
            pageElement.classList.add('turned');
            // Запускаем переход ровно когда страница перевернется (1.5s CSS transition)
            if(isLast) setTimeout(diveInto3D, 1500); 
        }

        function diveInto3D() {
            // Единый синхронизированный таймлайн для идеальной плавности
            const tl = gsap.timeline();
            tl.to("#book-container", { scale: 5, opacity: 0, duration: 1.5, ease: "power2.in" })
              .to("#flash", { opacity: 1, duration: 0.5 }, "-=0.5") // Вспышка начинается до исчезновения книги
              .call(() => {
                  document.getElementById('book-container').remove();
                  document.getElementById('webgl-container').style.opacity = 1;
                  isSceneActive = true;
              })
              .to("#flash", { opacity: 0, duration: 1 })
              .to("#hint-3d", { opacity: 1, duration: 1 }, "-=0.5");
        }

        const messages = [
            "Пусть каждый твой день расцветает, как самый прекрасный весенний сад. С 8 Марта!",
            "Твоя улыбка сияет ярче первого весеннего солнца. Продолжай освещать этот мир!",
            "Ты — воплощение нежности, грации и красоты. С самым теплым праздником весны!",
            "Пусть в твоей душе всегда звучит легкая, счастливая и вдохновляющая музыка.",
            "Оставайся такой же невероятной, сияющей и неповторимой каждый день.",
            "Весна начинается с тебя. Пусть жизнь дарит только самые приятные сюрпризы!",
            "Пусть легкость весны наполняет каждое твое мгновение радостью и гармонией.",
            "Ты делаешь этот мир красивее просто тем, что ты в нем есть. С праздником!",
            "Пусть все твои самые смелые мечты сбываются так же легко, как тает снег.",
            "Желаю океан искренних улыбок, море цветов и бесконечного счастья!",
            "Твой внутренний свет невозможно затмить. Сияй, люби, мечтай!",
            "Пусть эта весна принесет в твою жизнь самое настоящее, доброе волшебство."
        ];

        // --- 2. НАСТРОЙКА 3D СЦЕНЫ (Адаптивный масштаб) ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xffffff, 0.015); 

        // Идеальное расстояние камеры: на телефоне дальше, чтобы влезла вся галерея
        const initialCameraZ = window.innerWidth < 768 ? 38 : 25;
        let currentZoomZ = initialCameraZ; // Переменная для хранения зума пользователя

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 150);
        const cameraTarget = new THREE.Vector3(0, 0, 0); 
        camera.position.set(0, 4, currentZoomZ); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.9); scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffe1e8, 1.2); dirLight.position.set(5, 15, 10); scene.add(dirLight);

        const galleryGroup = new THREE.Group(); scene.add(galleryGroup);
        const animationState = { autoRotationSpeed: 0.05 }; 

        // --- 3. ЧАСТИЦЫ ---
        const dustGeo = new THREE.BufferGeometry(); const dustCount = 400; const dustPos = new Float32Array(dustCount * 3);
        for(let i=0; i<dustCount*3; i++) dustPos[i] = (Math.random() - 0.5) * 40;
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xe69ab0, size: 0.12, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const dust = new THREE.Points(dustGeo, dustMat); scene.add(dust);

        const petalGeo = new THREE.PlaneGeometry(0.3, 0.3);
        const petalMat = new THREE.MeshBasicMaterial({ color: 0xffd1dc, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
        const petals = [];
        for(let i=0; i<60; i++) {
            const mesh = new THREE.Mesh(petalGeo, petalMat);
            mesh.position.set((Math.random() - 0.5) * 30, Math.random() * 20, (Math.random() - 0.5) * 20);
            mesh.rotation.set(Math.random(), Math.random(), Math.random());
            mesh.userData = { speedY: Math.random() * 0.03 + 0.01, speedRot: Math.random() * 0.05 + 0.01 };
            scene.add(mesh); petals.push(mesh);
        }

        // --- 4. ПРЕДЗАГРУЗКА И ГАРАНТИЯ КОМПИЛЯЦИИ (Fix Lags) ---
        const textureLoader = new THREE.TextureLoader();
        const photos = [];

        function loadTexture(index) {
            return new Promise((resolve) => {
                const exts = ['.jpg', '.jpeg', '.png', '.webp']; let i = 0;
                const tryLoad = () => {
                    if (i >= exts.length) {
                        const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
                        const ctx = canvas.getContext('2d'); ctx.fillStyle = '#f4e6e8'; ctx.fillRect(0,0,512,512);
                        resolve(new THREE.CanvasTexture(canvas)); return;
                    }
                    textureLoader.load(`${index}${exts[i]}`, resolve, undefined, () => { i++; tryLoad(); });
                }; tryLoad();
            });
        }

        async function buildFlower() {
            for (let i = 1; i <= 12; i++) {
                const texture = await loadTexture(i); texture.encoding = THREE.sRGBEncoding;
                const imgAspect = texture.image ? texture.image.width / texture.image.height : 1;
                const width = 3.5 * imgAspect; const height = 3.5;
                
                const geo = new THREE.PlaneGeometry(width, height);
                const mat = new THREE.MeshStandardMaterial({ map: texture, side: THREE.DoubleSide, roughness: 0.2 });
                const mesh = new THREE.Mesh(geo, mat);

                const veilGeo = new THREE.PlaneGeometry(width + 0.02, height + 0.02);
                const veilMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, transmission: 0.8, roughness: 0.6, transparent: true, opacity: 1, depthWrite: false });
                const veilMesh = new THREE.Mesh(veilGeo, veilMat); veilMesh.position.z = 0.02; mesh.add(veilMesh);

                const edges = new THREE.EdgesGeometry(geo);
                const frameMat = new THREE.LineBasicMaterial({ color: 0xd4af37, transparent: true, opacity: 0 }); 
                const frameMesh = new THREE.LineSegments(edges, frameMat); frameMesh.position.z = 0.01; mesh.add(frameMesh);

                let radius, angle, tilt;
                if (i <= 4) { radius = 3.5; angle = (i / 4) * Math.PI * 2; tilt = -0.15; mesh.position.y = 1.5; } 
                else { radius = 7.5; angle = ((i - 4) / 8) * Math.PI * 2; tilt = -0.05; mesh.position.y = -1.5; }

                mesh.position.x = Math.cos(angle) * radius; mesh.position.z = Math.sin(angle) * radius;
                const lookVec = new THREE.Vector3(mesh.position.x, mesh.position.y, mesh.position.z).normalize();
                mesh.lookAt(mesh.position.clone().add(lookVec)); mesh.rotateX(tilt);

                mesh.userData = { id: i, msg: messages[i - 1], veilMat: veilMat, frameMat: frameMat, isOpened: false, width: width, height: height, baseY: mesh.position.y, floatOffset: Math.random() * Math.PI * 2 };
                galleryGroup.add(mesh); photos.push(mesh);
            }
            
            // ВАЖНО: Принудительно компилируем материалы в видеокарту ДО появления сцены
            renderer.compile(scene, camera);
        }
        buildFlower();

        // --- 5. УМНОЕ УПРАВЛЕНИЕ (Drag, Pinch-to-Zoom, Click) ---
        const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
        let isZoomed = false; let activeMesh = null; let isHovered = false;

        let isPointerDown = false;
        let isDraggingOrPinching = false; // Защита от ложных кликов
        let startX = 0;
        let startRotY = 0;
        let initialPinchDistance = null; // Для зума двумя пальцами

        const container = document.getElementById('webgl-container');

        // Управление зумом с ПК (Колесико)
        window.addEventListener('wheel', (e) => {
            if (!isSceneActive || isZoomed) return;
            currentZoomZ += e.deltaY * 0.02;
            currentZoomZ = THREE.MathUtils.clamp(currentZoomZ, 15, 45); // Ограничиваем зум
            gsap.to(camera.position, { z: currentZoomZ, duration: 0.3, ease: "power1.out" });
        });

        function onPointerDown(e) {
            if (!isSceneActive || isZoomed) return;
            isPointerDown = true;
            isDraggingOrPinching = false;
            
            // Обработка касания
            if (e.touches && e.touches.length === 2) {
                // Начало щипка
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                initialPinchDistance = Math.sqrt(dx*dx + dy*dy);
            } else {
                // Начало вращения
                startX = e.touches ? e.touches[0].clientX : e.clientX;
                startRotY = galleryGroup.rotation.y;
            }
            gsap.to(animationState, { autoRotationSpeed: 0, duration: 0.5 }); // Стоп авто-вращение
        }

        function onPointerMove(e) {
            if (!isSceneActive || isZoomed) return;
            
            // 1. Обработка ЗУМА двумя пальцами (Pinch)
            if (e.touches && e.touches.length === 2 && isPointerDown) {
                isDraggingOrPinching = true;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const distance = Math.sqrt(dx*dx + dy*dy);

                if (initialPinchDistance) {
                    const delta = initialPinchDistance - distance;
                    currentZoomZ += delta * 0.05;
                    currentZoomZ = THREE.MathUtils.clamp(currentZoomZ, 15, 45);
                    gsap.to(camera.position, { z: currentZoomZ, duration: 0.2 });
                    initialPinchDistance = distance;
                }
                return;
            }

            // 2. Обработка ВРАЩЕНИЯ одним пальцем / мышью
            const currentX = e.touches ? e.touches[0].clientX : e.clientX;
            const currentY = e.touches ? e.touches[0].clientY : e.clientY;

            if (isPointerDown && (!e.touches || e.touches.length === 1)) {
                const deltaX = currentX - startX;
                if (Math.abs(deltaX) > 5) isDraggingOrPinching = true; // Защита от клика
                galleryGroup.rotation.y = startRotY + (deltaX * 0.005);
            }

            // 3. Hover эффект (Только если не тащим/не свайпаем)
            if (!isDraggingOrPinching) {
                mouse.x = (currentX / window.innerWidth) * 2 - 1; 
                mouse.y = -(currentY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(photos);

                if (intersects.length > 0) {
                    if(!isHovered || activeMesh !== intersects[0].object) {
                        document.body.style.cursor = 'pointer'; 
                        activeMesh = intersects[0].object; isHovered = true;
                        gsap.to(activeMesh.scale, {x: 1.05, y: 1.05, z: 1.05, duration: 0.4});
                    }
                } else {
                    if(isHovered && activeMesh) {
                        document.body.style.cursor = 'default'; 
                        gsap.to(activeMesh.scale, {x: 1, y: 1, z: 1, duration: 0.4});
                        isHovered = false; activeMesh = null;
                    }
                }
            }
        }

        function onPointerUp(e) {
            if (!isSceneActive || isZoomed || !isPointerDown) return;
            isPointerDown = false;
            initialPinchDistance = null;

            gsap.to(animationState, { autoRotationSpeed: 0.05, duration: 2 });

            // Защита: Если был зум или свайп - не открываем фото
            if (isDraggingOrPinching) {
                isDraggingOrPinching = false;
                return; 
            }

            processClick();
        }

        function processClick() {
            if (!activeMesh) return; 
            isZoomed = true; 
            document.getElementById('hint-3d').style.opacity = '0';
            
            gsap.to(animationState, { autoRotationSpeed: 0, duration: 1.5, ease: "power2.out" });
            gsap.to(activeMesh.userData.veilMat, { opacity: 0, duration: 1.2, ease: "power2.inOut" });

            const fovRad = (camera.fov * Math.PI) / 180;
            const screenAspect = window.innerWidth / window.innerHeight;
            const photoAspect = activeMesh.userData.width / activeMesh.userData.height;
            
            let requiredDistance = (screenAspect < photoAspect) ? 
                (activeMesh.userData.width / 2) / Math.tan(fovRad / 2) / screenAspect : 
                (activeMesh.userData.height / 2) / Math.tan(fovRad / 2);
            requiredDistance *= (window.innerWidth < 768 ? 1.35 : 1.25); 

            const targetWorldPos = new THREE.Vector3(); activeMesh.getWorldPosition(targetWorldPos);
            const normalMatrix = new THREE.Matrix3().getNormalMatrix(activeMesh.matrixWorld);
            const normal = new THREE.Vector3(0, 0, 1).applyMatrix3(normalMatrix).normalize();
            
            const camFinalPos = targetWorldPos.clone().add(normal.multiplyScalar(requiredDistance));
            camFinalPos.add(new THREE.Vector3(0, activeMesh.userData.height * 0.15, 0));

            gsap.to(camera.position, { x: camFinalPos.x, y: camFinalPos.y, z: camFinalPos.z, duration: 2, ease: "power3.inOut" });
            gsap.to(cameraTarget, { x: targetWorldPos.x, y: targetWorldPos.y, z: targetWorldPos.z, duration: 2, ease: "power3.inOut" });

            document.getElementById('scene-darkener').classList.add('active');
            setTimeout(() => {
                document.getElementById('message-text').innerText = activeMesh.userData.msg;
                document.getElementById('ui-layer').classList.add('active');
            }, 1300);
        }

        window.zoomOut = function() {
            document.getElementById('ui-layer').classList.remove('active');
            document.getElementById('scene-darkener').classList.remove('active');
            
            if (activeMesh && !activeMesh.userData.isOpened) {
                activeMesh.userData.isOpened = true; 
                gsap.to(activeMesh.userData.frameMat, { opacity: 0.8, duration: 2, delay: 0.5 });
            }

            // Возвращаем камеру на ТЕКУЩИЙ зум пользователя (currentZoomZ), а не на стандартный
            gsap.to(camera.position, { x: 0, y: 4, z: currentZoomZ, duration: 2.2, ease: "power3.inOut" });
            gsap.to(cameraTarget, { x: 0, y: 0, z: 0, duration: 2.2, ease: "power3.inOut",
                onComplete: () => { 
                    isZoomed = false; 
                    if(activeMesh) gsap.to(activeMesh.scale, {x: 1, y: 1, z: 1, duration: 0.4}); 
                    activeMesh = null; isHovered = false; 
                }
            });
            gsap.to(animationState, { autoRotationSpeed: 0.05, duration: 2, ease: "power2.in", delay: 0.5 });
        };

        // Слушатели событий
        container.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);
        
        container.addEventListener('touchstart', onPointerDown, {passive: false});
        window.addEventListener('touchmove', onPointerMove, {passive: false});
        window.addEventListener('touchend', onPointerUp);

        window.addEventListener('resize', () => { 
            // Обновляем базовую дистанцию при перевороте экрана
            currentZoomZ = window.innerWidth < 768 ? 38 : 25;
            if(!isZoomed) camera.position.z = currentZoomZ;
            
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        });

        // --- 6. РЕНДЕР-ЛУП ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime(); const delta = clock.getDelta();

            galleryGroup.rotation.y += animationState.autoRotationSpeed * delta;
            photos.forEach((p) => { p.position.y = p.userData.baseY + Math.sin(time * 1.5 + p.userData.floatOffset) * 0.15; });

            dust.position.y += 0.01; if (dust.position.y > 10) dust.position.y = 0; dust.rotation.y += 0.001;

            petals.forEach(p => {
                p.position.y -= p.userData.speedY; p.rotation.x += p.userData.speedRot; p.rotation.y += p.userData.speedRot;
                if (p.position.y < -10) { p.position.y = 15; p.position.x = (Math.random() - 0.5) * 30; }
            });

            camera.lookAt(cameraTarget); renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
